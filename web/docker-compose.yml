services:
  nginx-proxy-manager:
    image: 'jc21/nginx-proxy-manager:latest'
    container_name: 'nginx-proxy-manager'
    ports:
      - '80:80' # HTTP
      - '443:443' # HTTPS
      - '81:81' # Console Admin

    environment:
      TZ: "Europe/Paris"

    volumes:
      - ./data:/data
      - ./letsencrypt:/etc/letsencrypt
    
    
networks:
  default:
    external: true
    name: proxy
